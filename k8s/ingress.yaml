apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: drmp-ingress
  namespace: drmp
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - drmp.example.com
    - api.drmp.example.com
    secretName: drmp-tls
  rules:
  - host: drmp.example.com
    http:
      paths:
      - path: /live
        pathType: Prefix
        backend:
          service:
            name: media-edge
            port:
              number: 1935
      - path: /webrtc
        pathType: Prefix
        backend:
          service:
            name: media-edge
            port:
              number: 8081
  - host: api.drmp.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 80