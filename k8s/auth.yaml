apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: drmp
  labels:
    app: auth
    tier: security
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
        tier: security
    spec:
      containers:
      - name: auth
        image: drmp/auth:latest
        ports:
        - containerPort: 8080
          name: api
        env:
        - name: RUST_LOG
          value: "info"
        - name: DATABASE_URL
          value: "postgresql://postgres:password@postgres:5432/drmp"
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: drmp
  labels:
    app: auth
    tier: security
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    name: api
  selector:
    app: auth