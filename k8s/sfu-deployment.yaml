apiVersion: apps/v1
kind: Deployment
metadata:
  name: sfu-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sfu
  template:
    metadata:
      labels:
        app: sfu
    spec:
      containers:
      - name: sfu
        image: drmp/sfu:latest
        ports:
        - containerPort: 5004
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        env:
        - name: RUST_LOG
          value: "info"
        - name: DATABASE_URL
          value: "postgresql://postgres:password@postgres:5432/drmp"
        livenessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 5004
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sfu-service
spec:
  selector:
    app: sfu
  ports:
  - name: sfu
    port: 5004
    targetPort: 5004
  type: ClusterIP