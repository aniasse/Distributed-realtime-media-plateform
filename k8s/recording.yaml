apiVersion: apps/v1
kind: Deployment
metadata:
  name: recording
  namespace: drmp
  labels:
    app: recording
    tier: storage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recording
  template:
    metadata:
      labels:
        app: recording
        tier: storage
    spec:
      containers:
      - name: recording
        image: drmp/recording:latest
        ports:
        - containerPort: 8080
          name: api
        env:
        - name: RUST_LOG
          value: "info"
        - name: DATABASE_URL
          value: "postgresql://postgres:password@postgres:5432/drmp"
        - name: STORAGE_PATH
          value: "/recordings"
        volumeMounts:
        - name: recordings
          mountPath: /recordings
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: recording
  namespace: drmp
  labels:
    app: recording
    tier: storage
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    name: api
  selector:
    app: recording

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: recordings-pvc
  namespace: drmp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: fast-storage