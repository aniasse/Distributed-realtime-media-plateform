apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-edge-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: media-edge
  template:
    metadata:
      labels:
        app: media-edge
    spec:
      containers:
      - name: media-edge
        image: drmp/media-edge:latest
        ports:
        - containerPort: 1935
        - containerPort: 8081
        resources:
          requests:
            cpu: "1000m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        env:
        - name: RUST_LOG
          value: "info"
        - name: DATABASE_URL
          value: "postgresql://postgres:password@postgres:5432/drmp"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: media-edge-service
spec:
  selector:
    app: media-edge
  ports:
  - name: rtmp
    port: 1935
    targetPort: 1935
  - name: webrtc
    port: 8081
    targetPort: 8081
  type: LoadBalancer