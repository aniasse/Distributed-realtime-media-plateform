apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: drmp
  labels:
    app: gateway
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        tier: api
    spec:
      containers:
      - name: gateway
        image: drmp/gateway:latest
        ports:
        - containerPort: 8080
          name: api
        env:
        - name: RUST_LOG
          value: "info"
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: drmp
  labels:
    app: gateway
    tier: api
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    name: http
  selector:
    app: gateway