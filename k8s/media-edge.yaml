apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-edge
  namespace: drmp
  labels:
    app: media-edge
    tier: ingress
spec:
  replicas: 2
  selector:
    matchLabels:
      app: media-edge
  template:
    metadata:
      labels:
        app: media-edge
        tier: ingress
    spec:
      containers:
      - name: media-edge
        image: drmp/media-edge:latest
        ports:
        - containerPort: 1935
          name: rtmp
        - containerPort: 8081
          name: webrtc
        env:
        - name: RUST_LOG
          value: "info"
        - name: DATABASE_URL
          value: "postgresql://postgres:password@postgres:5432/drmp"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: media-edge
  namespace: drmp
  labels:
    app: media-edge
    tier: ingress
spec:
  type: LoadBalancer
  ports:
  - port: 1935
    targetPort: 1935
    name: rtmp
  - port: 8081
    targetPort: 8081
    name: webrtc
  selector:
    app: media-edge