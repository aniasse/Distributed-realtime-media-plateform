version: '3.8'

services:
  # Development version with hot reload
  media-edge:
    build:
      context: ../services/media-edge
      dockerfile: Dockerfile.dev
    ports:
      - "1935:1935"
      - "8081:8081"
    volumes:
      - ../services/media-edge:/app
      - cargo_registry:/usr/local/cargo/registry
    environment:
      - RUST_LOG=debug
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/drmp
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    command: cargo watch -x run

  sfu:
    build:
      context: ../services/sfu
      dockerfile: Dockerfile.dev
    ports:
      - "5004:5004"
    volumes:
      - ../services/sfu:/app
      - cargo_registry:/usr/local/cargo/registry
    environment:
      - RUST_LOG=debug
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/drmp
    depends_on:
      - postgres
      - redis
      - media-edge
    restart: unless-stopped
    command: cargo watch -x run

  control-plane:
    build:
      context: ../services/control-plane
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ../services/control-plane:/app
      - cargo_registry:/usr/local/cargo/registry
    environment:
      - RUST_LOG=debug
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/drmp
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    command: cargo watch -x run

  recording:
    build:
      context: ../services/recording
      dockerfile: Dockerfile.dev
    volumes:
      - ../services/recording:/app
      - recordings:/recordings
      - cargo_registry:/usr/local/cargo/registry
    environment:
      - RUST_LOG=debug
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/drmp
      - STORAGE_PATH=/recordings
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    command: cargo watch -x run

  auth:
    build:
      context: ../services/auth
      dockerfile: Dockerfile.dev
    ports:
      - "8081:8080"
    volumes:
      - ../services/auth:/app
      - cargo_registry:/usr/local/cargo/registry
    environment:
      - RUST_LOG=debug
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/drmp
    depends_on:
      - postgres
    restart: unless-stopped
    command: cargo watch -x run

  gateway:
    build:
      context: ../services/gateway
      dockerfile: Dockerfile.dev
    ports:
      - "8888:8080"
    volumes:
      - ../services/gateway:/app
      - cargo_registry:/usr/local/cargo/registry
    environment:
      - RUST_LOG=debug
    depends_on:
      - media-edge
      - sfu
      - control-plane
      - recording
      - auth
    restart: unless-stopped
    command: cargo watch -x run

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=drmp
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  recordings:
  prometheus_data:
  grafana_data:
  cargo_registry: